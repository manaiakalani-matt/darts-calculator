<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#09090b" />
  <title>Dartboard Calculator</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background: #09090b;
      color: #fff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overscroll-behavior: none;
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    .shell { min-height: 100dvh; padding: max(10px, env(safe-area-inset-top)) 10px calc(10px + env(safe-area-inset-bottom)); }
    .layout { width: 100%; max-width: 520px; min-height: calc(100dvh - 20px); margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
    .header, .panel, .board-card, .flash-card, details { border: 1px solid #27272a; background: #18181b; border-radius: 22px; box-shadow: 0 14px 28px rgba(0,0,0,.34); }
    .header { padding: 10px; display: grid; gap: 10px; }
    .title-row { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    h1 { margin: 0; font-size: 17px; line-height: 1; }
    .note { color: #a1a1aa; font-size: 12px; font-weight: 800; }
    .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .tab { min-height: 42px; border: 1px solid #3f3f46; border-radius: 14px; background: #09090b; color: #d4d4d8; font-weight: 950; }
    .tab.active { background: #f4f4f5; color: #09090b; }
    .screen { display: none; flex: 1; min-height: 0; }
    .screen.active { display: flex; flex-direction: column; gap: 10px; }
    .panel { padding: 12px; }
    .score-row { display: grid; grid-template-columns: minmax(120px,1fr) 132px; gap: 10px; align-items: stretch; }
    .score-card { min-width: 0; border-radius: 18px; background: #09090b; border: 1px solid #3f3f46; padding: 10px 12px; }
    .label-row, .field-label { color: #d4d4d8; font-size: 11px; line-height: 1; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
    .label-row { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
    .score-input { width: 100%; height: 58px; border: 0; border-radius: 14px; background: #18181b; color: #fff; outline: none; text-align: center; font-size: clamp(34px,12vw,56px); font-weight: 950; line-height: 1; letter-spacing: -.05em; }
    .range-card, .field { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
    .select-wrap { position: relative; }
    .select-wrap::after { content: "▼"; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #d4d4d8; font-size: 11px; pointer-events: none; }
    select { appearance: none; -webkit-appearance: none; width: 100%; height: 38px; border: 1px solid #3f3f46; border-radius: 12px; background: #09090b; color: #fff; outline: none; padding: 0 28px 0 9px; font-size: 14px; font-weight: 800; }
    .primary-button { height: 42px; width: 100%; border: 0; border-radius: 14px; background: #f4f4f5; color: #09090b; font-size: 14px; font-weight: 950; box-shadow: 0 8px 18px rgba(0,0,0,.26); }
    .board-card { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; padding: 8px; overflow: hidden; }
    .board-wrap { width: 100%; }
    .dartboard { display: block; width: 100%; height: auto; max-height: calc(100dvh - 214px); border-radius: 18px; background: #000; box-shadow: 0 18px 34px rgba(0,0,0,.5); touch-action: manipulation; user-select: none; }
    .segment:active { opacity: .82; }
    .flash-screen { padding-bottom: 86px; }
    details { overflow: hidden; }
    summary { min-height: 48px; padding: 0 14px; display: flex; align-items: center; font-size: 13px; font-weight: 950; color: #d4d4d8; }
    .filter-grid { padding: 0 14px 14px; display: grid; gap: 10px; }
    .flash-card { flex: 1; min-height: 390px; padding: 20px; display: grid; gap: 16px; align-content: space-between; text-align: center; touch-action: pan-y; transition: transform .16s ease; }
    .flash-card.swipe-left { transform: translateX(-10px) rotate(-1deg); }
    .flash-card.swipe-right { transform: translateX(10px) rotate(1deg); }
    .eyebrow { color: #a1a1aa; font-size: 12px; font-weight: 900; letter-spacing: .11em; text-transform: uppercase; }
    .flash-score { color: #facc15; font-size: clamp(84px,30vw,150px); line-height: .86; font-weight: 1000; letter-spacing: -.08em; }
    .answer-zone { display: grid; gap: 8px; align-content: center; min-height: 128px; }
    .first-answer { color: #facc15; font-size: clamp(44px,15vw,82px); line-height: .92; font-weight: 1000; letter-spacing: -.05em; }
    .checkout-answer { font-size: clamp(18px,5vw,28px); font-weight: 950; color: #f4f4f5; }
    .flash-hint, .flash-count { color: #a1a1aa; font-weight: 800; min-height: 1.25em; }
    .flash-hint { font-size: 15px; }
    .flash-count { font-size: 12px; }
    .hidden { visibility: hidden; }
    .choices { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
    .choice { min-height: 68px; border: 1px solid #3f3f46; border-radius: 18px; background: #09090b; color: #fff; font-size: 23px; font-weight: 1000; }
    .choice.correct { background: rgba(34,197,94,.25); border-color: #22c55e; }
    .choice.wrong { background: rgba(239,68,68,.25); border-color: #ef4444; }
    .checkout-list { padding: 0 14px 14px; display: grid; grid-template-columns: repeat(auto-fit,minmax(145px,1fr)); gap: 8px; }
    .checkout-item { border: 1px solid #3f3f46; border-radius: 12px; background: #09090b; padding: 9px 10px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .checkout-score { color: #facc15; font-size: 16px; font-weight: 1000; }
    .checkout-route { color: #d4d4d8; font-size: 13px; font-weight: 850; text-align: right; }
    .actions { position: fixed; left: 0; right: 0; bottom: 0; padding: 10px 10px calc(10px + env(safe-area-inset-bottom)); background: rgba(9,9,11,.92); border-top: 1px solid #27272a; backdrop-filter: blur(14px); z-index: 20; }
    .actions[hidden] { display: none; }
    .actions-inner { width: 100%; max-width: 520px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .action { min-height: 60px; border: 1px solid #3f3f46; border-radius: 18px; background: #18181b; color: #fff; font-size: 15px; font-weight: 950; }
    @media (max-width: 380px) {
      .shell { padding-left: 6px; padding-right: 6px; }
      .layout { gap: 6px; }
      .header, .panel { padding: 8px; border-radius: 18px; }
      .score-row { grid-template-columns: 1fr 112px; gap: 8px; }
      .score-input { height: 52px; }
      select { height: 34px; font-size: 13px; }
      .primary-button { height: 38px; }
      .board-card { padding: 5px; border-radius: 18px; }
      .dartboard { max-height: calc(100dvh - 196px); }
      .flash-card { min-height: 330px; border-radius: 22px; padding: 16px; }
      .flash-score { font-size: clamp(72px,29vw,120px); }
      .first-answer { font-size: clamp(40px,14vw,68px); }
      .choice { min-height: 60px; }
      .actions-inner { gap: 6px; }
      .action { min-height: 56px; font-size: 13px; }
    }
    @media (min-width: 760px) {
      .layout, .actions-inner { max-width: 680px; }
      .dartboard { max-height: calc(100dvh - 220px); }
      .filter-grid { grid-template-columns: repeat(3,1fr); }
      .choices { grid-template-columns: repeat(4,1fr); }
      .flash-card { min-height: 460px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="layout">
      <header class="header">
        <div class="title-row">
          <h1>Dartboard Calculator</h1>
          <div class="note" id="headerNote">Practise checkouts</div>
        </div>
        <nav class="tabs" aria-label="App screens">
          <button type="button" class="tab active" data-screen="calculator">Calculator</button>
          <button type="button" class="tab" data-screen="flashcards">Flash cards</button>
        </nav>
      </header>

      <section id="calculatorScreen" class="screen active" aria-label="Dartboard calculator">
        <section class="panel" aria-label="Score controls">
          <div class="score-row">
            <div class="score-card">
              <div class="label-row"><span>Required</span><span id="scoreNote">Tap board to play</span></div>
              <input id="score" class="score-input" inputmode="numeric" value="62" aria-label="Required score" />
            </div>
            <div class="range-card">
              <label class="field-label" for="range">Random</label>
              <div class="select-wrap"><select id="range"></select></div>
              <button type="button" id="random" class="primary-button">New target</button>
            </div>
          </div>
        </section>
        <section class="board-card"><div class="board-wrap" id="boardWrap"></div></section>
      </section>

      <section id="flashcardsScreen" class="screen flash-screen" aria-label="First dart flash cards">
        <details class="filters">
          <summary>Filters and mode</summary>
          <div class="filter-grid">
            <div class="field"><label class="field-label" for="flashRange">Score range</label><div class="select-wrap"><select id="flashRange"><option value="all">All scores, 60 to 100</option><option value="60-69">60 to 69</option><option value="70-79">70 to 79</option><option value="80-89">80 to 89</option><option value="90-100">90 to 100</option></select></div></div>
            <div class="field"><label class="field-label" for="flashTarget">First dart target</label><div class="select-wrap"><select id="flashTarget"><option value="all">All targets</option></select></div></div>
            <div class="field"><label class="field-label" for="flashMode">Mode</label><div class="select-wrap"><select id="flashMode"><option value="flash">Flash card</option><option value="multiple">Multiple choice</option></select></div></div>
          </div>
        </details>

        <section class="flash-card" id="flashCard" tabindex="0" aria-live="polite">
          <div><div class="eyebrow">Score</div><div class="flash-score" id="flashScore">100</div></div>
          <div class="answer-zone">
            <div class="eyebrow">First dart</div>
            <div class="first-answer hidden" id="firstDartAnswer">T20 (60)</div>
            <div class="checkout-answer hidden" id="checkoutAnswer">T20 (60), D20 (40)</div>
            <div class="flash-hint" id="flashHint">Tap to reveal. Swipe left for next.</div>
          </div>
          <div class="choices" id="choices" hidden></div>
          <div class="flash-count" id="flashCount">40 cards</div>
        </section>

        <details class="list-panel"><summary>Show current checkout list</summary><div class="checkout-list" id="checkoutList"></div></details>
      </section>
    </div>
  </main>

  <nav class="actions" id="flashActions" aria-label="Flash card actions" hidden>
    <div class="actions-inner">
      <button type="button" id="previousFlash" class="action">Previous</button>
      <button type="button" id="revealFlash" class="action">Reveal</button>
      <button type="button" id="nextFlash" class="action primary">Next</button>
    </div>
  </nav>

  <script>
    const BOARD_ORDER = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];
    const TARGET_RANGES = [
      { label: "41-50", min: 41, max: 50 }, { label: "51-60", min: 51, max: 60 },
      { label: "61-70", min: 61, max: 70 }, { label: "71-80", min: 71, max: 80 },
      { label: "81-90", min: 81, max: 90 }, { label: "91-100", min: 91, max: 100 },
      { label: "101-110", min: 101, max: 110 }, { label: "111-120", min: 111, max: 120 },
      { label: "121-130", min: 121, max: 130 }, { label: "131-140", min: 131, max: 140 },
      { label: "141-150", min: 141, max: 150 }, { label: "151-170", min: 151, max: 170 }
    ];
    const COLOURS = { background: "#050505", wire: "#8b8b8b", white: "#f4ebcf", black: "#181818", red: "#c93625", green: "#3d9951", textLight: "#ffffff", textDark: "#202020", checkout: "#7CFF84", checkoutStroke: "#063b16" };
    const CHECKOUTS = [
      { score: 100, first: "T20", second: "D20" }, { score: 98, first: "T20", second: "D19" },
      { score: 97, first: "T19", second: "D20" }, { score: 96, first: "T20", second: "D18" },
      { score: 95, first: "T19", second: "D19" }, { score: 94, first: "T18", second: "D20" },
      { score: 93, first: "T19", second: "D18" }, { score: 92, first: "T20", second: "D16" },
      { score: 91, first: "T17", second: "D20" }, { score: 90, first: "T20", second: "D15" },
      { score: 89, first: "T19", second: "D16" }, { score: 88, first: "T16", second: "D20" },
      { score: 87, first: "T17", second: "D18" }, { score: 86, first: "T18", second: "D16" },
      { score: 85, first: "T15", second: "D20" }, { score: 84, first: "T20", second: "D12" },
      { score: 83, first: "T17", second: "D16" }, { score: 82, first: "T14", second: "D20" },
      { score: 81, first: "T19", second: "D12" }, { score: 80, first: "T20", second: "D10" },
      { score: 79, first: "T19", second: "D11" }, { score: 78, first: "T18", second: "D12" },
      { score: 77, first: "T19", second: "D10" }, { score: 76, first: "T20", second: "D8" },
      { score: 75, first: "T17", second: "D12" }, { score: 74, first: "T14", second: "D16" },
      { score: 73, first: "T19", second: "D8" }, { score: 72, first: "T16", second: "D12" },
      { score: 71, first: "T13", second: "D16" }, { score: 70, first: "T10", second: "D20" },
      { score: 69, first: "T15", second: "D12" }, { score: 68, first: "T20", second: "D4" },
      { score: 67, first: "T17", second: "D8" }, { score: 66, first: "T10", second: "D18" },
      { score: 65, first: "T19", second: "D4" }, { score: 64, first: "T16", second: "D8" },
      { score: 63, first: "T13", second: "D12" }, { score: 62, first: "T10", second: "D16" },
      { score: 61, first: "T15", second: "D8" }, { score: 60, first: "20", second: "D20" }
    ];

    const $ = (id) => document.getElementById(id);
    const scoreInput = $("score"), rangeSelect = $("range"), randomButton = $("random"), boardWrap = $("boardWrap"), scoreNote = $("scoreNote"), headerNote = $("headerNote");
    const calculatorScreen = $("calculatorScreen"), flashcardsScreen = $("flashcardsScreen"), screenTabs = Array.from(document.querySelectorAll(".tab")), flashActions = $("flashActions");
    const flashRange = $("flashRange"), flashTarget = $("flashTarget"), flashMode = $("flashMode"), flashCard = $("flashCard"), flashScore = $("flashScore"), firstDartAnswer = $("firstDartAnswer"), checkoutAnswer = $("checkoutAnswer"), flashHint = $("flashHint"), choices = $("choices"), flashCount = $("flashCount"), checkoutList = $("checkoutList"), previousFlash = $("previousFlash"), revealFlash = $("revealFlash"), nextFlash = $("nextFlash");

    let currentFlashCard = null, answerVisible = false, answeredChoice = false, history = [], historyIndex = -1, startX = 0, startY = 0, touchFromControl = false, skipTap = false;

    TARGET_RANGES.forEach((range) => { const option = document.createElement("option"); option.value = range.label; option.textContent = range.label; if (range.label === "61-70") option.selected = true; rangeSelect.appendChild(option); });

    function setScreen(name, updateHash = true) {
      const isCards = name === "flashcards";
      calculatorScreen.classList.toggle("active", !isCards);
      flashcardsScreen.classList.toggle("active", isCards);
      flashActions.hidden = !isCards;
      headerNote.textContent = isCards ? "First dart practice" : "Practise checkouts";
      screenTabs.forEach((tab) => { const active = tab.dataset.screen === name; tab.classList.toggle("active", active); tab.setAttribute("aria-current", active ? "page" : "false"); });
      if (updateHash) window.history.replaceState(null, "", isCards ? "#flashcards" : "#calculator");
      if (isCards && !currentFlashCard) resetDeck();
      if (!isCards) renderBoard();
    }
    screenTabs.forEach((tab) => tab.addEventListener("click", () => setScreen(tab.dataset.screen)));

    function polar(cx, cy, r, angleDeg) { const angleRad = ((angleDeg - 90) * Math.PI) / 180; return { x: cx + r * Math.cos(angleRad), y: cy + r * Math.sin(angleRad) }; }
    function sector(cx, cy, innerR, outerR, startAngle, endAngle) { const os = polar(cx, cy, outerR, endAngle), oe = polar(cx, cy, outerR, startAngle), is = polar(cx, cy, innerR, startAngle), ie = polar(cx, cy, innerR, endAngle); const large = endAngle - startAngle <= 180 ? "0" : "1"; return [`M ${os.x} ${os.y}`, `A ${outerR} ${outerR} 0 ${large} 0 ${oe.x} ${oe.y}`, `L ${is.x} ${is.y}`, `A ${innerR} ${innerR} 0 ${large} 1 ${ie.x} ${ie.y}`, "Z"].join(" "); }
    function svgEl(tag, attrs = {}) { const el = document.createElementNS("http://www.w3.org/2000/svg", tag); Object.entries(attrs).forEach(([key, value]) => { if (key === "style") Object.assign(el.style, value); else el.setAttribute(key, value); }); return el; }
    function addText(parent, text, attrs) { const el = svgEl("text", attrs); el.textContent = text; parent.appendChild(el); }
    function getScore() { const parsed = Number.parseInt(scoreInput.value, 10); if (Number.isNaN(parsed)) return 0; return Math.max(0, Math.min(170, parsed)); }
    function shot(score, value, canCheckout) { const remaining = score - value; const isCheckout = remaining === 0 && canCheckout; const bust = remaining < 0 || remaining === 1 || (remaining === 0 && !canCheckout); return { remaining, isCheckout, bust, text: bust ? "" : String(remaining) }; }
    function setScore(value, note) { scoreInput.value = String(value); scoreNote.textContent = note || "Tap board to play"; renderBoard(); }
    function handleHit(value, canCheckout) { const result = shot(getScore(), value, canCheckout); if (result.bust) { scoreNote.textContent = "Bust"; return; } setScore(result.remaining, result.isCheckout ? "Finished" : `Hit ${value}`); }
    function textColour(ring, index) { if (ring === "singleOuter" || ring === "singleInner") return index % 2 === 0 ? COLOURS.textLight : COLOURS.textDark; return COLOURS.textLight; }
    function fillColour(ring, index) { if (ring === "double" || ring === "triple") return index % 2 === 0 ? COLOURS.red : COLOURS.green; return index % 2 === 0 ? COLOURS.black : COLOURS.white; }

    function renderBoard() {
      const score = getScore(), cx = 500, cy = 500;
      const board = { outerNumber: 452, doubleOuter: 405, doubleInner: 355, tripleOuter: 238, tripleInner: 195, outerBull: 72, innerBull: 36 };
      const rings = [
        { key: "double", inner: board.doubleInner, outer: board.doubleOuter, multiplier: 2, label: 380, show: true, finish: true },
        { key: "singleOuter", inner: board.tripleOuter, outer: board.doubleInner, multiplier: 1, label: 296, show: true, finish: false },
        { key: "triple", inner: board.tripleInner, outer: board.tripleOuter, multiplier: 3, label: 216, show: true, finish: false },
        { key: "singleInner", inner: board.outerBull, outer: board.tripleInner, multiplier: 1, label: 134, show: false, finish: false }
      ];
      boardWrap.innerHTML = "";
      const svg = svgEl("svg", { viewBox: "0 0 1000 1000", class: "dartboard", role: "img", "aria-label": "Clickable dartboard checkout calculator" });
      boardWrap.appendChild(svg);
      svg.appendChild(svgEl("rect", { width: 1000, height: 1000, fill: COLOURS.background }));
      svg.appendChild(svgEl("circle", { cx, cy, r: 470, fill: "none", stroke: "#3c3c3c", "stroke-width": 4 }));
      svg.appendChild(svgEl("circle", { cx, cy, r: 430, fill: "none", stroke: "#9a9a9a", "stroke-width": 2 }));
      svg.appendChild(svgEl("circle", { cx, cy, r: 410, fill: "none", stroke: "#595959", "stroke-width": 4 }));
      BOARD_ORDER.forEach((number, index) => { const pos = polar(cx, cy, board.outerNumber, index * 18); addText(svg, number, { x: pos.x, y: pos.y, "text-anchor": "middle", "dominant-baseline": "middle", "font-size": 38, "font-weight": 900, fill: "#fff", style: { paintOrder: "stroke", stroke: "#111", strokeWidth: 3 } }); });
      rings.forEach((ring) => {
        BOARD_ORDER.forEach((number, index) => {
          const start = index * 18 - 9, end = index * 18 + 9, centre = index * 18, value = number * ring.multiplier, result = shot(score, value, ring.finish);
          const group = svgEl("g", { class: "segment" }); group.style.cursor = result.bust ? "default" : "pointer"; group.addEventListener("click", () => handleHit(value, ring.finish)); svg.appendChild(group);
          group.appendChild(svgEl("path", { d: sector(cx, cy, ring.inner, ring.outer, start, end), fill: fillColour(ring.key, index), stroke: COLOURS.wire, "stroke-width": 2 }));
          if (ring.show && !result.bust) { const pos = polar(cx, cy, ring.label, centre); addText(group, result.text, { x: pos.x, y: pos.y, "text-anchor": "middle", "dominant-baseline": "middle", "font-size": 24, "font-weight": 800, fill: result.isCheckout ? COLOURS.checkout : textColour(ring.key, index), style: { paintOrder: "stroke", stroke: result.isCheckout ? COLOURS.checkoutStroke : ring.key.includes("single") ? "transparent" : "rgba(0,0,0,.2)", strokeWidth: result.isCheckout ? 5 : 2, pointerEvents: "none" } }); }
        });
      });
      addBull(svg, cx, cy, board.outerBull, 25, false, COLOURS.green, -54);
      addBull(svg, cx, cy, board.innerBull, 50, true, COLOURS.red, 1);
    }
    function addBull(svg, cx, cy, radius, value, finish, colour, textOffset) { const result = shot(getScore(), value, finish); const group = svgEl("g"); group.style.cursor = result.bust ? "default" : "pointer"; group.addEventListener("click", () => handleHit(value, finish)); svg.appendChild(group); group.appendChild(svgEl("circle", { cx, cy, r: radius, fill: colour, stroke: COLOURS.wire, "stroke-width": 2 })); if (!result.bust) addText(group, result.text, { x: cx, y: cy + textOffset, "text-anchor": "middle", "dominant-baseline": "middle", "font-size": 24, "font-weight": 800, fill: result.isCheckout ? COLOURS.checkout : "#fff", style: { pointerEvents: "none", paintOrder: "stroke", stroke: result.isCheckout ? COLOURS.checkoutStroke : "transparent", strokeWidth: result.isCheckout ? 5 : 0 } }); }

    function segmentNumber(label) { if (label === "Bull") return 50; if (/^T\d+$/.test(label)) return Number(label.slice(1)) * 3; if (/^D\d+$/.test(label)) return Number(label.slice(1)) * 2; return Number(label); }
    function formatSegment(label) { return `${label} (${segmentNumber(label)})`; }
    function route(card) { return `${formatSegment(card.first)}, ${formatSegment(card.second)}`; }
    function targetValue(target) { return target === "20" ? 999 : Number(target.replace("T", "")); }
    function firstTargets() { return [...new Set(CHECKOUTS.map((item) => item.first))].sort((a, b) => targetValue(a) - targetValue(b)); }
    function filteredCards() { const range = flashRange.value, target = flashTarget.value; return CHECKOUTS.filter((card) => { let rangeMatch = true; if (range !== "all") { const [low, high] = range.split("-").map(Number); rangeMatch = card.score >= low && card.score <= high; } return rangeMatch && (target === "all" || card.first === target); }); }
    function randomCard() { const cards = filteredCards(); if (!cards.length) return null; if (cards.length === 1) return cards[0]; let next = cards[Math.floor(Math.random() * cards.length)]; while (currentFlashCard && next.score === currentFlashCard.score) next = cards[Math.floor(Math.random() * cards.length)]; return next; }
    function setAnswer(visible) { answerVisible = visible; firstDartAnswer.classList.toggle("hidden", !visible); checkoutAnswer.classList.toggle("hidden", !visible); revealFlash.textContent = visible ? "Hide" : "Reveal"; if (!currentFlashCard) return; if (visible) flashHint.textContent = "Swipe left for next, right for previous."; else if (flashMode.value === "multiple") flashHint.textContent = "Choose the first dart. Swipe left for next."; else flashHint.textContent = "Tap to reveal. Swipe left for next."; }
    function updatePreviousButton() { const disabled = historyIndex <= 0; previousFlash.disabled = disabled; previousFlash.style.opacity = disabled ? ".55" : "1"; }
    function showCard(card) { currentFlashCard = card; answeredChoice = false; if (!card) { flashScore.textContent = "No cards"; firstDartAnswer.textContent = ""; checkoutAnswer.textContent = ""; flashHint.textContent = "Change the filters to include some scores."; choices.hidden = true; revealFlash.disabled = true; renderList(); updateCount(); updatePreviousButton(); return; } revealFlash.disabled = false; flashScore.textContent = card.score; firstDartAnswer.textContent = formatSegment(card.first); checkoutAnswer.textContent = route(card); if (flashMode.value === "multiple") { choices.hidden = false; renderChoices(); } else { choices.hidden = true; choices.innerHTML = ""; } setAnswer(false); renderList(); updateCount(); updatePreviousButton(); }
    function goNext() { const next = randomCard(); if (!next) { showCard(null); return; } if (historyIndex < history.length - 1) history = history.slice(0, historyIndex + 1); history.push(next); historyIndex = history.length - 1; showCard(next); }
    function goPrevious() { if (historyIndex <= 0) { flashHint.textContent = "No previous card yet."; updatePreviousButton(); return; } historyIndex -= 1; showCard(history[historyIndex]); }
    function resetDeck() { history = []; historyIndex = -1; currentFlashCard = null; goNext(); }
    function renderChoices() { choices.innerHTML = ""; const wrong = firstTargets().filter((target) => target !== currentFlashCard.first); shuffle([currentFlashCard.first, ...shuffle(wrong).slice(0, 3)]).forEach((option) => { const button = document.createElement("button"); button.type = "button"; button.className = "choice"; button.textContent = option; button.addEventListener("click", (event) => { event.stopPropagation(); handleChoice(button, option); }); choices.appendChild(button); }); }
    function handleChoice(button, option) { if (answeredChoice) return; answeredChoice = true; const correct = option === currentFlashCard.first; if (correct) button.classList.add("correct"); else { button.classList.add("wrong"); Array.from(choices.children).forEach((choice) => { if (choice.textContent === currentFlashCard.first) choice.classList.add("correct"); }); } setAnswer(true); flashHint.textContent = correct ? "Correct. Swipe left for next." : `Answer: ${formatSegment(currentFlashCard.first)}. Swipe left for next.`; }
    function updateCount() { const count = filteredCards().length, position = historyIndex >= 0 ? ` · Card ${historyIndex + 1} of ${history.length}` : ""; flashCount.textContent = `${count} card${count === 1 ? "" : "s"}${position}`; }
    function renderList() { checkoutList.innerHTML = ""; filteredCards().sort((a, b) => b.score - a.score).forEach((card) => { const row = document.createElement("div"); row.className = "checkout-item"; row.innerHTML = `<span class="checkout-score">${card.score}</span><span class="checkout-route">${route(card)}</span>`; checkoutList.appendChild(row); }); }
    function shuffle(array) { const copy = [...array]; for (let i = copy.length - 1; i > 0; i -= 1) { const j = Math.floor(Math.random() * (i + 1)); [copy[i], copy[j]] = [copy[j], copy[i]]; } return copy; }
    function isControl(element) { return Boolean(element.closest("button, select, input, summary, details")); }
    function swipeFeedback(direction) { const className = direction === "left" ? "swipe-left" : "swipe-right"; flashCard.classList.add(className); window.setTimeout(() => flashCard.classList.remove(className), 160); }
    function onTouchStart(event) { if (event.touches.length !== 1) return; touchFromControl = isControl(event.target); startX = event.touches[0].clientX; startY = event.touches[0].clientY; }
    function onTouchEnd(event) { if (touchFromControl || !event.changedTouches.length) return; const touch = event.changedTouches[0]; const dx = touch.clientX - startX, dy = touch.clientY - startY; const isSwipe = Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.25; if (!isSwipe) return; skipTap = true; window.setTimeout(() => { skipTap = false; }, 350); if (dx < 0) { swipeFeedback("left"); goNext(); } else { swipeFeedback("right"); goPrevious(); } }

    scoreInput.addEventListener("input", () => { scoreInput.value = scoreInput.value.replace(/[^0-9]/g, ""); scoreNote.textContent = "Manual score"; renderBoard(); });
    randomButton.addEventListener("click", () => { const range = TARGET_RANGES.find((item) => item.label === rangeSelect.value) || TARGET_RANGES[0]; const randomScore = Math.floor(Math.random() * (range.max - range.min + 1)) + range.min; setScore(randomScore, `Random ${range.label}`); });
    firstTargets().forEach((target) => { const option = document.createElement("option"); option.value = target; option.textContent = target; flashTarget.appendChild(option); });
    flashCard.addEventListener("click", () => { if (skipTap) return; if (flashMode.value === "flash") setAnswer(!answerVisible); });
    flashCard.addEventListener("touchstart", onTouchStart, { passive: true });
    flashCard.addEventListener("touchend", onTouchEnd, { passive: true });
    flashCard.addEventListener("keydown", (event) => { if (event.key === "Enter" || event.key === " ") { event.preventDefault(); if (flashMode.value === "flash") setAnswer(!answerVisible); } });
    previousFlash.addEventListener("click", goPrevious);
    revealFlash.addEventListener("click", () => setAnswer(!answerVisible));
    nextFlash.addEventListener("click", goNext);
    flashRange.addEventListener("change", resetDeck);
    flashTarget.addEventListener("change", resetDeck);
    flashMode.addEventListener("change", resetDeck);
    document.addEventListener("keydown", (event) => { if (!flashcardsScreen.classList.contains("active")) return; if (event.key === "ArrowRight") goNext(); if (event.key === "ArrowLeft") goPrevious(); if (event.key === " " && flashMode.value === "flash") { event.preventDefault(); setAnswer(!answerVisible); } });

    renderBoard();
    resetDeck();
    setScreen(location.hash === "#flashcards" ? "flashcards" : "calculator", false);
  </script>
</body>
